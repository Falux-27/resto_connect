name: resto_connect_dakar
description: Application IA de recommandation de restaurants — JOJ Dakar 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & routing
  get: ^4.6.6

  # Network
  dio: ^5.4.0
  flutter_dotenv: ^5.1.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  gap: ^3.0.1

  # Map
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Storage
  shared_preferences: ^2.2.3

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/